<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EasySynQ UI Prototype</title>
</head>
<body>
<div id="app"></div>

<style>
  :root {
    --bg: #0f1419; --surface: #161c24; --surface-2: #1d242e; --surface-3: #252d39;
    --border: #2a3441; --border-strong: #3a4654;
    --text: #e6edf3; --text-dim: #9aa7b4; --text-faint: #6b7785;
    --accent: #4a9eff; --accent-dim: #2d5a8f;
    --green: #3fb950; --green-bg: #0f2e1a;
    --amber: #d29922; --amber-bg: #2e2410;
    --red: #f85149; --red-bg: #2e1414;
    --purple: #a371f7;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", Monaco, "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; overflow: hidden; }
  .app-shell { display: grid; grid-template-rows: 56px 1fr; height: 100vh; position: relative; }

  /* TOPBAR */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .brand-mark { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: white; }
  .brand-suffix { color: var(--text-dim); font-weight: 500; font-size: 12px; }
  .module-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; font-size: 11px; color: var(--text-dim); cursor: pointer; transition: all 0.1s; }
  .module-chip:hover { border-color: var(--accent); background: var(--surface-3); color: var(--text); }
  .module-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .breadcrumb { color: var(--text-dim); font-size: 12px; display: flex; align-items: center; gap: 8px; min-width: 0; flex-shrink: 1; overflow: hidden; }
  .breadcrumb span:last-child { color: var(--text); white-space: nowrap; }
  .breadcrumb .sep { color: var(--text-faint); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  /* PULSE BUTTON */
  .pulse-btn { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text); transition: all 0.1s; }
  .pulse-btn:hover { border-color: var(--border-strong); background: var(--surface-3); }
  .pulse-btn-label { font-weight: 600; letter-spacing: 0.02em; }
  .pulse-btn-count { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-weight: 700; }
  .pulse-btn-count.red { color: var(--red); }
  .pulse-btn-count.amber { color: var(--amber); }
  .pulse-btn-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 0 currentColor; animation: pulse-glow 2s ease-in-out infinite; }
  @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 currentColor; } 50% { box-shadow: 0 0 0 4px transparent; } }
  .pulse-btn-chevron { color: var(--text-faint); font-size: 10px; }

  .search { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; width: 240px; color: var(--text-dim); font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .search-kbd { margin-left: auto; padding: 1px 6px; background: var(--surface-3); border-radius: 3px; font-family: var(--mono); font-size: 10px; }
  .user-chip { display: flex; align-items: center; gap: 8px; padding: 4px 10px 4px 4px; background: var(--surface-2); border-radius: 20px; border: 1px solid var(--border); cursor: pointer; }
  .user-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #f85149, #d29922); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
  .user-name { font-size: 12px; }
  .user-role { font-size: 10px; color: var(--text-dim); }

  /* MAIN */
  .main { display: grid; grid-template-columns: 240px 1fr; overflow: hidden; }

  /* NAV */
  .nav { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px 0; }
  .nav-section { padding: 0 12px; margin-bottom: 14px; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-faint); text-transform: uppercase; padding: 6px 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-dim); transition: all 0.1s; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--text); }
  .nav-item.active .nav-icon { color: var(--accent); }
  .nav-icon { width: 16px; text-align: center; font-size: 13px; color: var(--text-faint); }
  .nav-badge { margin-left: auto; font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--surface-3); color: var(--text-dim); font-weight: 600; }
  .nav-badge.red { background: rgba(248,81,73,0.2); color: var(--red); }
  .nav-badge.amber { background: rgba(210,153,34,0.2); color: var(--amber); }

  /* CONTENT */
  .content { overflow-y: auto; background: var(--bg); }
  .content-header { padding: 20px 28px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: flex-start; gap: 16px; }
  .content-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .content-subtitle { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
  .content-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 12px; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; transition: all 0.1s; }
  .btn:hover { background: var(--surface-3); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .btn.primary:hover { background: #5aa8ff; }
  .btn.danger { background: var(--red-bg); border-color: rgba(248,81,73,0.3); color: var(--red); }
  .btn.ghost { background: transparent; border-color: var(--border); }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: var(--mono); letter-spacing: 0.02em; }
  .badge.green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  .badge.red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
  .badge.amber { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(210,153,34,0.3); }
  .badge.blue { background: rgba(74,158,255,0.1); color: var(--accent); border: 1px solid rgba(74,158,255,0.3); }
  .badge.gray { background: var(--surface-3); color: var(--text-dim); border: 1px solid var(--border); }
  .badge.purple { background: rgba(163,113,247,0.1); color: var(--purple); border: 1px solid rgba(163,113,247,0.3); }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .content-body { padding: 24px 28px; }

  /* DASHBOARD */
  .dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .card-title { font-size: 13px; font-weight: 600; }
  .card-sub { font-size: 11px; color: var(--text-dim); margin-left: auto; }
  .card-body { padding: 18px; }
  .chart-fpy { height: 220px; position: relative; padding: 10px 0; }
  .chart-line { stroke: var(--accent); stroke-width: 2; fill: none; }
  .chart-area { fill: url(#fpyGradient); }
  .chart-grid { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2 4; }
  .chart-label { fill: var(--text-faint); font-size: 10px; font-family: var(--mono); }
  .chart-target { stroke: var(--green); stroke-width: 1; stroke-dasharray: 4 4; }
  .pareto-row { display: grid; grid-template-columns: 110px 1fr 40px; align-items: center; gap: 10px; padding: 6px 0; font-size: 12px; }
  .pareto-label { color: var(--text-dim); }
  .pareto-bar { height: 18px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
  .pareto-fill { height: 100%; background: linear-gradient(90deg, var(--red), #ff7b6e); border-radius: 3px; }
  .pareto-count { font-family: var(--mono); font-weight: 600; text-align: right; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .stat-trend { font-size: 11px; margin-top: 4px; }
  .stat-trend.up { color: var(--green); }
  .stat-trend.down { color: var(--red); }

  /* GOOD NEWS BAR */
  .good-news-bar { display: flex; gap: 10px; padding: 10px 14px; background: linear-gradient(90deg, rgba(63,185,80,0.06), transparent); border: 1px solid rgba(63,185,80,0.2); border-radius: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .good-news-icon { color: var(--green); font-size: 16px; }
  .good-news-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); border-right: 1px solid rgba(63,185,80,0.2); padding-right: 12px; }
  .good-news-item { font-size: 12px; color: var(--text-dim); padding: 0 12px; border-right: 1px solid var(--border); }
  .good-news-item:last-child { border-right: none; }
  .good-news-item strong { color: var(--green); font-family: var(--mono); }

  /* TABLES */
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-chip { padding: 4px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; font-size: 11px; color: var(--text-dim); cursor: pointer; }
  .filter-chip.active { background: var(--accent-dim); color: var(--text); border-color: var(--accent); }
  table.data { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table.data th { background: var(--surface-2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  table.data td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 12px; }
  table.data tr:last-child td { border-bottom: none; }
  table.data tr:hover td { background: var(--surface-2); }
  table.data tr.row-locked td { background: rgba(248,81,73,0.05); }
  table.data tr.row-warn td { background: rgba(210,153,34,0.05); }
  .mono { font-family: var(--mono); font-size: 11px; }
  .row-icon { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }

  /* DETAIL */
  .detail-grid { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
  .detail-main { display: flex; flex-direction: column; gap: 16px; }
  .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .info-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; font-weight: 600; }
  .info-value { font-size: 13px; }

  /* HISTORY */
  .history { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .history-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .history-list { padding: 8px 0; max-height: 600px; overflow-y: auto; }
  .history-item { padding: 10px 14px; border-left: 2px solid transparent; font-size: 11px; }
  .history-item.signature { border-left-color: var(--accent); background: rgba(74,158,255,0.04); }
  .history-action { font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .history-meta { color: var(--text-dim); font-size: 10px; }
  .history-hash { font-family: var(--mono); font-size: 9px; color: var(--text-faint); margin-top: 2px; }

  /* JOB */
  .traveler-status { display: flex; align-items: center; gap: 0; margin-bottom: 20px; }
  .status-step { flex: 1; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); position: relative; font-size: 11px; }
  .status-step:not(:last-child) { border-right: none; }
  .status-step:first-child { border-radius: 6px 0 0 6px; }
  .status-step:last-child { border-radius: 0 6px 6px 0; }
  .status-step.done { background: var(--green-bg); border-color: rgba(63,185,80,0.3); color: var(--green); }
  .status-step.current { background: var(--accent-dim); border-color: var(--accent); color: var(--text); font-weight: 600; }
  .step-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; }
  .status-step.done .step-label, .status-step.current .step-label { color: inherit; opacity: 0.7; }
  .chart-imported { background: var(--green-bg); border: 1px solid rgba(63,185,80,0.3); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }

  /* SIGNATURE */
  .sig-pending { background: var(--amber-bg); border: 1px dashed rgba(210,153,34,0.4); border-radius: 10px; padding: 16px; text-align: center; }
  .inspection-tolerance { background: var(--surface-2); padding: 10px 14px; border-radius: 6px; display: flex; align-items: center; gap: 16px; margin-bottom: 12px; font-size: 12px; }
  .tolerance-range { font-family: var(--mono); font-weight: 600; }

  /* DOCS */
  .doc-layout { display: grid; grid-template-columns: 320px 1fr; gap: 16px; height: 600px; }
  .doc-list { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow-y: auto; }
  .doc-item { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .doc-item:hover { background: var(--surface-2); }
  .doc-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }
  .doc-item-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .doc-item-meta { font-size: 10px; color: var(--text-dim); display: flex; gap: 8px; align-items: center; }
  .doc-viewer { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; }
  .doc-viewer-toolbar { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .doc-page { flex: 1; background: #1a1a1a; padding: 40px; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; }
  .doc-page-paper { background: #f5f5f0; color: #1a1a1a; width: 100%; max-width: 580px; padding: 40px 50px; min-height: 700px; font-family: Georgia, serif; font-size: 11px; line-height: 1.7; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .doc-page-paper h1 { font-size: 18px; margin-bottom: 4px; }
  .doc-page-paper h2 { font-size: 13px; margin: 16px 0 6px; }
  .doc-page-paper .doc-meta { font-size: 9px; color: #666; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 16px; }
  .compat-banner { background: var(--amber-bg); border: 1px solid rgba(210,153,34,0.4); border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

  /* ASSETS */
  .asset-tree { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px; }
  .asset-node { padding: 8px 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .asset-node:hover { background: var(--surface-2); }
  .asset-node.selected { background: var(--accent-dim); }
  .asset-children { padding-left: 24px; border-left: 1px solid var(--border); margin-left: 14px; }
  .asset-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .asset-status-dot.active { background: var(--green); }
  .asset-status-dot.oos { background: var(--red); box-shadow: 0 0 0 3px rgba(248,81,73,0.15); }

  /* LOCK BANNERS */
  .oos-banner { background: var(--red-bg); border: 1px solid var(--red); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .oos-lock { width: 36px; height: 36px; border-radius: 8px; background: rgba(248,81,73,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .held-banner { background: var(--red-bg); border: 2px solid var(--red); border-radius: 10px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .held-lock { width: 44px; height: 44px; background: var(--red); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }

  /* LOCK TRIGGER (clickable lock affordance) */
  .lock-trigger { cursor: pointer; position: relative; transition: all 0.1s; }
  .lock-trigger::after { content: 'Why?'; position: absolute; top: 4px; right: 6px; font-size: 9px; padding: 2px 6px; background: rgba(0,0,0,0.55); border-radius: 8px; color: rgba(255,255,255,0.85); font-weight: 600; letter-spacing: 0.04em; opacity: 0; transition: opacity 0.1s; pointer-events: none; }
  .lock-trigger:hover::after { opacity: 1; }
  .lock-trigger:hover { box-shadow: 0 0 0 2px var(--accent); }

  /* MODULE NOTE */
  .module-note-row { background: linear-gradient(90deg, rgba(163,113,247,0.05), transparent); border-left: 2px solid var(--purple); padding: 10px 14px; margin-bottom: 16px; font-size: 11px; color: var(--text-dim); border-radius: 0 6px 6px 0; }

  /* PM */
  .pm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pm-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .pm-card.overdue { border-color: rgba(248,81,73,0.4); background: rgba(248,81,73,0.05); }
  .pm-card.due { border-color: rgba(210,153,34,0.4); background: rgba(210,153,34,0.05); }
  .pm-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .pm-title { font-size: 12px; font-weight: 600; line-height: 1.3; }
  .pm-schedule { display: inline-block; font-size: 10px; color: var(--text-dim); background: var(--surface-3); padding: 2px 7px; border-radius: 10px; margin-bottom: 8px; font-family: var(--mono); }
  .pm-meta { display: flex; flex-direction: column; gap: 3px; font-size: 11px; padding-top: 8px; border-top: 1px solid var(--border); }
  .pm-meta > div { display: flex; justify-content: space-between; }
  .pm-meta > div > span:first-child { color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .overdue-text { color: var(--red); font-weight: 600; }
  .due-text { color: var(--amber); font-weight: 600; }

  /* NCR */
  .whys-list { display: flex; flex-direction: column; gap: 12px; }
  .why-row { display: grid; grid-template-columns: 60px 1fr; gap: 12px; align-items: flex-start; }
  .why-num { background: var(--surface-3); border-radius: 6px; padding: 8px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .why-num.root { background: var(--accent-dim); color: var(--text); }
  .why-input { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: inherit; font-size: 12px; color: var(--text); width: 100%; resize: vertical; min-height: 38px; line-height: 1.5; }
  .why-input.filled { border-color: var(--accent-dim); }
  .why-input:focus { outline: none; border-color: var(--accent); }
  .disposition-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .disp-option { padding: 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; font-size: 12px; }
  .disp-option.selected { background: var(--accent-dim); border-color: var(--accent); }
  .disp-option.requires-extra { position: relative; }
  .disp-option.requires-extra::after { content: '+'; position: absolute; top: 4px; right: 6px; font-size: 9px; padding: 1px 5px; background: var(--purple); border-radius: 8px; color: white; font-weight: 700; }

  /* CONCESSION PANEL */
  .concession-panel { margin-top: 16px; background: linear-gradient(135deg, rgba(163,113,247,0.06), rgba(74,158,255,0.06)); border: 1px solid rgba(163,113,247,0.3); border-radius: 10px; overflow: hidden; }
  .concession-head { padding: 12px 16px; border-bottom: 1px solid rgba(163,113,247,0.2); display: flex; align-items: center; gap: 10px; background: rgba(163,113,247,0.08); }
  .concession-icon { width: 28px; height: 28px; border-radius: 7px; background: rgba(163,113,247,0.2); color: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .concession-title { font-size: 12px; font-weight: 700; }
  .concession-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .concession-body { padding: 14px 16px; }
  .concession-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

        <div class="drawer-tile ${sevClass}" ${nav}>

      { id: 'R-05', t: 'Key person dependency — QM', l: 3, i: 4, sev: 'high', own: 'M. Rodriguez', rev: 'Overdue', status: 'Open' },
      { id: 'R-06', t: 'Operator certification expiry', l: 3, i: 2, sev: 'low', own: 'M. Rodriguez', rev: 'Feb 28', status: 'Monitoring' },
      { id: 'R-07', t: 'Snapshot / backup corruption', l: 1, i: 3, sev: 'low', own: 'IT', rev: 'Jan 12', status: 'Mitigated' },
      { id: 'R-08', t: 'Quench medium degradation', l: 2, i: 3, sev: 'med', own: 'J. Hayes', rev: 'Mar 4', status: 'Monitoring' }
    ];
    const bubbles = {};
    risks.forEach(r => { const k = `${r.l}-${r.i}`; bubbles[k] = bubbles[k] || []; bubbles[k].push(r); });
    function cellClass(l, i) {
      const s = l * i;
      if (s >= 15) return 'l5'; if (s >= 10) return 'l4'; if (s >= 6) return 'l3'; if (s >= 3) return 'l2'; return 'l1';
    }
    let m = '<div class="risk-matrix"><div></div>';
    for (let l = 1; l <= 5; l++) m += `<div class="rm-label">L${l}</div>`;
    for (let i = 5; i >= 1; i--) {
      m += `<div class="rm-label">I${i}</div>`;
      for (let l = 1; l <= 5; l++) {
        const cr = bubbles[`${l}-${i}`] || [];
        m += `<div class="rm-cell ${cellClass(l, i)}">${cr.map(r => `<div class="rm-bubble" title="${r.t}">${r.id.split('-')[1]}</div>`).join('')}</div>`;
      }
    }
    m += '</div>';

    return `
      <div class="content-header">
        <div><div class="content-title">Risk Register</div><div class="content-subtitle">ISO 9001 §6.1 · 8 active risks · 1 review overdue</div></div>
        <div class="content-actions"><button class="btn">${ICONS.download} Export</button><button class="btn primary">${ICONS.plus} New Risk</button></div>

          <div class="stat-card"><div class="stat-label">Low</div><div class="stat-value" style="color:var(--green)">2</div></div>
          <div class="stat-card"><div class="stat-label">Review Overdue</div><div class="stat-value" style="color:var(--red)">1</div></div>
        </div>
        <div class="risk-layout">
          <div class="card">
            <div class="card-header"><div class="card-title">Risk Heat Map</div><div class="card-sub">Likelihood × Impact</div></div>
            <div class="card-body">
              <div style="display:flex;gap:8px;margin-bottom:12px"><div style="font-size:9px;color:var(--text-faint);writing-mode:vertical-rl;transform:rotate(180deg);align-self:center">IMPACT →</div><div style="flex:1">${m}</div></div>
              <div style="text-align:center;font-size:9px;color:var(--text-faint);margin-top:4px">LIKELIHOOD →</div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Top Risks</div><div class="card-sub">By score</div></div>
            <div class="card-body" style="padding:0">
              ${risks.sort((a,b) => (b.l*b.i) - (a.l*a.i)).slice(0, 5).map(r => `
                <div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
                  <span class="badge ${r.sev === 'high' ? 'red' : r.sev === 'med' ? 'amber' : 'green'}" style="font-family:var(--mono);min-width:42px;justify-content:center">${r.id}</span>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.t}</div>
                    <div style="font-size:10px;color:var(--text-dim);margin-top:2px">Score ${r.l*r.i}</div>
                  </div>
                </div>`).join('')}
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">All Risks</div></div>
          <table class="data" style="border:none;border-radius:0">
            <thead><tr><th>ID</th><th>Risk</th><th>L</th><th>I</th><th>Score</th><th>Severity</th><th>Owner</th><th>Last Review</th><th>Status</th></tr></thead>
            <tbody>
              ${risks.map(r => `

                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  // ====== AUDIT ======
  function clauseRow(num, title, rating, desc, evidence, findingId) {
    const ratings = ['Conforming', 'Minor', 'Major', 'Observation'];
    const classes = { Conforming: 'conf', Minor: 'minor', Major: 'major', Observation: 'obs' };
    const rowStyle = rating === 'Minor' ? 'border-color:rgba(210,153,34,0.3);background:rgba(210,153,34,0.03)'
                    : rating === 'Major' ? 'border-color:rgba(248,81,73,0.3);background:rgba(248,81,73,0.03)'
                    : rating === 'Observation' ? 'border-color:rgba(74,158,255,0.3);background:rgba(74,158,255,0.03)' : '';
    return `
      <div class="clause-row" style="${rowStyle}">
        <div class="clause-header">
          <div class="clause-num">${num}</div>
          <div class="clause-title">${title}</div>
          <div class="rating-group">${ratings.map(r => `<div class="rating-chip ${rating === r ? 'selected ' + classes[r] : ''}">${r}</div>`).join('')}</div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">${desc}</div>
        <div class="evidence-pills">
          ${evidence.map(e => `<div class="evidence-pill">⚯ ${e}</div>`).join('')}
          ${findingId ? `<div class="evidence-pill" style="color:var(--amber);border-color:var(--amber)">⚑ ${findingId}</div>` : ''}
        </div>
      </div>
    `;
  }

  // ====== EVENT HANDLERS ======
  let escHandler = null;

  function attachHandlers() {
    document.querySelectorAll('[data-nav]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        currentView = el.dataset.nav;
        pulseDrawerOpen = false;
        lockInspectorId = null;
        modalId = null;
        render();
      });
    });

    document.querySelectorAll('[data-toggle-pulse]').forEach(el => {
      el.addEventListener('click', () => { pulseDrawerOpen = !pulseDrawerOpen; render(); });
    });
    document.querySelectorAll('[data-close-pulse]').forEach(el => {
      el.addEventListener('click', () => { pulseDrawerOpen = false; render(); });
    });
    document.querySelectorAll('[data-drawer-tab]').forEach(el => {
      el.addEventListener('click', () => { pulseDrawerTab = el.dataset.drawerTab; render(); });
    });

    document.querySelectorAll('.lock-trigger').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.closest('[data-nav]')) return;
        if (e.target.closest('[data-modal]')) return;
        if (e.target.tagName === 'BUTTON' && !e.target.classList.contains('btn')) return;
        if (e.target.classList.contains('btn') && !el.contains(e.target.parentElement)) return;
        e.preventDefault();
        e.stopPropagation();
        lockInspectorId = el.dataset.lock;
        render();
      });
    });
    document.querySelectorAll('[data-close-inspector]').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target === el || e.target.classList.contains('inspector-backdrop')) {
          lockInspectorId = null; render();
        }
      });
    });

    document.querySelectorAll('[data-modal]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        modalId = el.dataset.modal;
        render();
      });
    });
    document.querySelectorAll('[data-close-modal]').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target === el || e.target.classList.contains('modal-backdrop')) {
          modalId = null; render();
        }
      });
    });

    document.querySelectorAll('[data-disposition]').forEach(opt => {
      opt.addEventListener('click', () => {
        ncrDisposition = opt.dataset.disposition;
        render();
      });
    });

    document.querySelectorAll('.rating-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const group = chip.parentElement;
        group.querySelectorAll('.rating-chip').forEach(c => c.classList.remove('selected', 'conf', 'minor', 'major', 'obs'));
        chip.classList.add('selected');
        const txt = chip.textContent.toLowerCase();
        if (txt.includes('conf')) chip.classList.add('conf');
        else if (txt.includes('minor')) chip.classList.add('minor');
        else if (txt.includes('major')) chip.classList.add('major');
        else if (txt.includes('obs')) chip.classList.add('obs');
      });
    });

    // Esc handler (proper cleanup so it doesn't accumulate)
    if (escHandler) document.removeEventListener('keydown', escHandler);
    escHandler = e => {
      if (e.key !== 'Escape') return;
      if (modalId) { modalId = null; render(); }
      else if (lockInspectorId) { lockInspectorId = null; render(); }
      else if (pulseDrawerOpen) { pulseDrawerOpen = false; render(); }
    };
    document.addEventListener('keydown', escHandler);
  }

  render();
